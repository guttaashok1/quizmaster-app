<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Interview Coach</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>" />
  <link rel="stylesheet" href="/styles.css?v=4" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 40px 24px;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px; padding: 38px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.08);
    }
    .auth-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
    }
    .auth-logo .icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 11px; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
      box-shadow: 0 0 20px rgba(99,102,241,0.40);
    }
    .auth-logo span { font-size: 18px; font-weight: 800; }
    .auth-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .auth-footer { margin-top: 22px; text-align: center; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      color: #fff; padding: 13px; border-radius: 999px;
      font-size: 15px; font-weight: 700; cursor: pointer; border: none;
      transition: box-shadow 0.2s, transform 0.15s; margin-top: 4px;
    }
    .btn-submit:hover:not(:disabled) {
      box-shadow: 0 0 28px rgba(99,102,241,0.50), 0 0 56px rgba(167,139,250,0.20);
      transform: translateY(-1px);
    }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .success-card {
      text-align: center; padding: 16px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 12px; font-size: 14px; color: var(--accent2);
      line-height: 1.65; display: none;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="icon">🎙️</div>
      Interview Coach
    </a>
    <div class="nav-links">
      <a href="/login.html" class="btn-nav-outline">Sign In</a>
      <a href="/register.html" class="btn-nav-filled">Get Started</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🎙️</div>
      <span>Interview Coach</span>
    </div>

    <div class="auth-title">Forgot your password?</div>
    <div class="auth-sub">Enter your email address and we'll send you a link to reset your password.</div>

    <div class="form-error" id="error-msg"></div>
    <div class="success-card" id="success-msg"></div>

    <form id="forgot-form" onsubmit="handleForgot(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" id="email" type="email"
               placeholder="you@example.com" autocomplete="email" required />
      </div>
      <button class="btn-submit" id="submit-btn" type="submit">Send Reset Link →</button>
    </form>

    <div class="auth-footer">
      Remembered it? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<footer class="footer">
  <div>© 2026 Interview Coach</div>
</footer>

<script>
  async function handleForgot(e) {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const err   = document.getElementById('error-msg');
    const succ  = document.getElementById('success-msg');
    const email = document.getElementById('email').value.trim();

    err.style.display = 'none';
    succ.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res  = await fetch('/api/interview-auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();

      if (!res.ok) {
        err.textContent = data.error || 'Something went wrong.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link →';
      } else {
        document.getElementById('forgot-form').style.display = 'none';
        succ.innerHTML = `
          <strong>📬 Check your inbox</strong><br/>
          If <strong>${email}</strong> is registered, a reset link is on its way.
          The link expires in 1 hour.
        `;
        succ.style.display = 'block';
      }
    } catch {
      err.textContent = 'Network error — please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Reset Link →';
    }
  }
</script>
</body>
</html>
