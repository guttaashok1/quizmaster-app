<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Interview Coach</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 38px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(14,165,233,0.08);
    }
    .auth-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
    }
    .auth-logo .icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(14,165,233,0.40);
    }
    .auth-logo span { font-size: 18px; font-weight: 800; }
    .auth-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
    .auth-footer { margin-top: 22px; text-align: center; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      color: #fff;
      padding: 13px; border-radius: 999px; font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; transition: box-shadow 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-submit:hover:not(:disabled) {
      box-shadow: 0 0 28px rgba(14,165,233,0.50), 0 0 56px rgba(167,139,250,0.20);
      transform: translateY(-1px);
    }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="icon">🎙️</div>
      Interview Coach
    </a>
    <div class="nav-links">
      <a href="/about.html" class="nav-link">About</a>
      <a href="/pricing.html" class="nav-link">Pricing</a>
      <a href="/register.html" class="btn-nav-filled">Create Account</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🎙️</div>
      <span>Interview Coach</span>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to access your AI interview coach</div>

    <div class="form-error" id="error-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="identifier">Username or Email</label>
        <input class="form-input" id="identifier" type="text" placeholder="Enter your username or email" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button class="btn-submit" id="submit-btn" type="submit">Sign In</button>
    </form>

    <div class="auth-footer" style="margin-top:14px">
      <a href="/forgot-password.html" style="color:var(--text-muted);font-size:13px">Forgot your password?</a>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one free</a>
    </div>
  </div>
</div>

<footer class="footer">
  <div>© 2026 Interview Coach</div>
</footer>

<script src="/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Redirect if already logged in
    if (Auth.getSession()) window.location.href = '/interview/';
  });

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    const identifier = document.getElementById('identifier').value.trim();
    const password = document.getElementById('password').value;

    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const result = await Auth.login(identifier, password);

    if (result.error) {
      err.textContent = result.error;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      window.location.href = '/interview/';
    }
  }
</script>
</body>
</html>
